<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MC-HTML Alpha 0.0.5</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 20; }
        .active { display: flex !important; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 350px; }
        .btn { padding: 12px; background: #444; color: white; border: 2px solid #000; cursor: pointer; font-weight: bold; font-size: 16px; outline: none; }
        .btn:hover { background: #555; border-color: #fff; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; display: none; pointer-events: none; z-index: 5; }
        #hotbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 4px; background: rgba(0,0,0,0.6); padding: 4px; border: 2px solid #111; z-index: 10; }
        .slot { width: 44px; height: 44px; background: #444; border: 3px solid #222; display: flex; align-items: center; justify-content: center; }
        .slot.active-slot { border-color: #ffffff; background: #666; }
        #debug-menu { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 10px; display: none; z-index: 100; font-family: monospace; font-size: 14px; }
        #loading-bar-container { width: 300px; height: 20px; background: #222; border: 2px solid #000; margin-top: 20px; }
        #loading-bar { width: 0%; height: 100%; background: #3e6a3e; transition: width 0.1s; }
    </style>
</head>
<body>
    <div id="debug-menu">
        MC-HTML 0.0.5 ALPHA<br>
        XYZ: <span id="val-pos">0 / 0 / 0</span><br>
        Chunk: <span id="val-chunk">0, 0</span><br>
        ID: <span id="val-peer">---</span>
    </div>

    <div id="loading-screen" class="screen" style="background: #111; z-index: 100;">
        <h1 id="loading-text">GENERANDO MUNDO...</h1>
        <div id="loading-bar-container"><div id="loading-bar"></div></div>
    </div>

    <div id="crosshair">+</div>

    <div id="hotbar">
        <div class="slot active-slot" id="slot-0">1</div>
        <div class="slot" id="slot-1">2</div>
        <div class="slot" id="slot-2">3</div>
    </div>

    <div id="main-menu" class="screen active">
        <h1>HTML-CRAFT 0.0.5</h1>
        <div class="btn-group">
            <button class="btn" onclick="showScreen('singleplayer')">UN JUGADOR</button>
            <button class="btn" onclick="showScreen('multi-menu')">MULTIJUGADOR</button>
        </div>
    </div>

    <div id="singleplayer" class="screen">
        <h2>MUNDOS LOCALES</h2>
        <div id="world-list" style="width:350px; height:150px; background:#222; overflow-y:auto; margin-bottom:10px;"></div>
        <div class="btn-group">
            <button class="btn" onclick="startLocalGame()">JUGAR SELECCIONADO</button>
            <button class="btn" onclick="createNewWorld()">NUEVO MUNDO</button>
            <button class="btn" onclick="showScreen('main-menu')">VOLVER</button>
        </div>
    </div>

    <div id="multi-menu" class="screen">
        <h2>MULTIJUGADOR</h2>
        <div class="btn-group">
            <button class="btn" onclick="startMP(true)">CREAR SERVIDOR (HOST)</button>
            <button class="btn" onclick="startMP(false)">UNIRSE POR ID</button>
            <button class="btn" onclick="showScreen('main-menu')">VOLVER</button>
        </div>
    </div>

    <div id="esc-menu" class="screen">
        <h2>PAUSA</h2>
        <button class="btn" style="width:200px" onclick="resumeGame()">REANUDAR</button>
        <button class="btn" style="width:200px" onclick="location.reload()">SALIR</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script>
        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if(id !== 'none') document.getElementById(id).classList.add('active');
        };
        window.startLocalGame = () => {
            showScreen('none');
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('hotbar').style.display = 'flex';
            if(window.initGame) window.initGame();
        };
        window.startMP = (isHost) => {
            let id = isHost ? null : prompt("Introduce ID del Host:");
            showScreen('none');
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('hotbar').style.display = 'flex';
            if(window.initGame) window.initGame(isHost, id);
        };
        window.resumeGame = () => { showScreen('none'); if(window.setPause) window.setPause(false); };
        window.addEventListener('keydown', e => {
            if(e.key === "Escape" && !document.getElementById('main-menu').classList.contains('active')) {
                showScreen('esc-menu');
                if(window.setPause) window.setPause(true);
            }
            if(e.key === "f3") {
                let d = document.getElementById('debug-menu');
                d.style.display = d.style.display === 'none' ? 'block' : 'none';
            }
        });
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
