<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MC-HTML Alpha 0.0.4</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 20; }
        .active { display: flex !important; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 350px; }
        .btn { padding: 12px; background: #444; color: white; border: 2px solid #000; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn:hover { background: #666; border-color: #fff; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; display: none; pointer-events: none; z-index: 5; }
        #network-status { position: fixed; top: 10px; right: 10px; font-size: 12px; z-index: 100; }
    </style>
</head>
<body>

    <div id="network-status">Comprobando conexión...</div>
    <div id="crosshair">+</div>

    <!-- MENÚ PRINCIPAL -->
    <div id="main-menu" class="screen active">
        <h1>HTML-CRAFT ALPHA 0.0.4</h1>
        <div class="btn-group">
            <button class="btn" onclick="showScreen('singleplayer')">Un Jugador</button>
            <button class="btn" onclick="showScreen('multiplayer')">Multijugador</button>
        </div>
    </div>

    <!-- PANTALLA UN JUGADOR -->
    <div id="singleplayer" class="screen">
        <h2>Mundos Locales</h2>
        <div class="btn-group">
            <button class="btn" id="btn-play-alpha">Cargar Mundo Alpha</button>
            <button class="btn" onclick="showScreen('main-menu')">Volver</button>
        </div>
    </div>

    <!-- PANTALLA MULTIJUGADOR -->
    <div id="multiplayer" class="screen">
        <h2>Multijugador</h2>
        <div id="server-list" style="width: 450px; background: #222; border: 2px solid #555; margin-bottom: 15px; padding: 10px;">
            <div style="padding: 10px; background: #333; cursor: pointer;" onclick="window.conectarServidor('OFFICIAL_TEST_2026')">
                🌐 SERVIDOR OFICIAL (Alpha Test)
            </div>
        </div>
        <div class="btn-group" style="flex-direction: row; width: 500px;">
            <button class="btn" style="flex:1" id="btn-host">Crear Servidor</button>
            <button class="btn" style="flex:1" id="btn-join">Unirse ID</button>
            <button class="btn" style="flex:1" onclick="showScreen('main-menu')">Volver</button>
        </div>
    </div>

    <!-- MENÚ DE PAUSA -->
    <div id="esc-menu" class="screen">
        <h2>PAUSA</h2>
        <div class="btn-group">
            <button class="btn" id="btn-resume">Reanudar</button>
            <button class="btn" onclick="location.reload()">Salir al Menú</button>
        </div>
    </div>

    <!-- IMPORT MAP PARA THREE.JS -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script>
        // Cambiar de pantalla
        window.showScreen = function(id) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                s.style.display = 'none';
            });
            const target = document.getElementById(id);
            if (target) {
                target.classList.add('active');
                target.style.display = 'flex';
            }
        };

        // Estado de red
        function updateNet() {
            document.getElementById('network-status').innerHTML = navigator.onLine ? "🟢 Online" : "🔴 Offline";
        }
        window.addEventListener('online', updateNet);
        window.addEventListener('offline', updateNet);
        updateNet();

        // Botones Un Jugador
        document.getElementById('btn-play-alpha').addEventListener('click', () => {
            showScreen('main-menu'); // ocultar menú
            startSinglePlayer();      // iniciar juego
        });

        // Funciones placeholder para iniciar juego
        function startSinglePlayer() {
            console.log("Iniciando Un Jugador...");
            // Mostrar crosshair al iniciar
            document.getElementById('crosshair').style.display = 'block';
            // Lógica de inicialización de tu juego (game.js)
            if(window.initSinglePlayer) window.initSinglePlayer();
        }

        // Botones Multijugador
        document.getElementById('btn-host').addEventListener('click', () => {
            console.log("Creando servidor...");
            if(window.hostServer) window.hostServer();
        });
        document.getElementById('btn-join').addEventListener('click', () => {
            const id = prompt("Ingrese ID del servidor:");
            if(id && window.joinServer) window.joinServer(id);
        });
    </script>

    <!-- SCRIPT PRINCIPAL DEL JUEGO -->
    <script type="module" src="game.js"></script>
</body>
</html>
