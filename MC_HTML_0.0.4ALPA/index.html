<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MC-HTML Alpha 0.0.4</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 20; }
        .active { display: flex !important; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 350px; }
        .btn { padding: 12px; background: #444; color: white; border: 2px solid #000; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn:hover { background: #666; border-color: #fff; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; display: none; pointer-events: none; z-index: 5; }
        #network-status { position: fixed; top: 10px; right: 10px; font-size: 12px; z-index: 100; }
        #world-list { width: 400px; height: 200px; background: #222; border: 2px solid #555; overflow-y: auto; margin-bottom: 15px; padding: 10px; }
        .world-item { padding: 10px; background: #333; margin-bottom: 5px; border: 1px solid #444; cursor: pointer; }
        .world-item:hover { background: #444; }
        .selected { border-color: #fff !important; background: #555 !important; }
    </style>
</head>
<body>

    <div id="network-status">Comprobando conexión...</div>
    <div id="crosshair">+</div>

    <div id="main-menu" class="screen active">
        <h1>HTML-CRAFT ALPHA 0.0.4</h1>
        <div class="btn-group">
            <button class="btn" onclick="showScreen('singleplayer')">Un Jugador</button>
            <button class="btn" onclick="showScreen('multiplayer')">Multijugador</button>
        </div>
    </div>

    <div id="singleplayer" class="screen">
        <h2>Mundos Locales</h2>
        <div id="world-list">
            </div>
        <div class="btn-group">
            <button class="btn" id="btn-play-selected">Jugar Mundo Seleccionado</button>
            <button class="btn" id="btn-create-world" style="background: #2a5a2a;">Crear Nuevo Mundo</button>
            <button class="btn" id="btn-delete-world" style="background: #5a2a2a;">Borrar Mundo</button>
            <button class="btn" onclick="showScreen('main-menu')">Volver</button>
        </div>
    </div>

    <div id="multiplayer" class="screen">
        <h2>Multijugador</h2>
        <div id="server-list" style="width: 450px; background: #222; border: 2px solid #555; margin-bottom: 15px; padding: 10px;">
            <div style="padding: 10px; background: #333; cursor: pointer;" onclick="alert('Conectando...')">
                🌐 SERVIDOR OFICIAL (Alpha Test)
            </div>
        </div>
        <div class="btn-group" style="flex-direction: row; width: 500px;">
            <button class="btn" style="flex:1" id="btn-host">Crear Servidor</button>
            <button class="btn" style="flex:1" id="btn-join">Unirse ID</button>
            <button class="btn" style="flex:1" onclick="showScreen('main-menu')">Volver</button>
        </div>
    </div>

    <div id="esc-menu" class="screen">
        <h2>PAUSA</h2>
        <div class="btn-group">
            <button class="btn" onclick="resumeGame()">Reanudar</button>
            <button class="btn" onclick="location.reload()">Salir al Menú</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script>
        let selectedWorldName = null;

        window.showScreen = function(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if(id !== 'none') {
                const target = document.getElementById(id);
                if (target) target.classList.add('active');
            }
        };

        // Cargar lista de mundos desde localStorage
        function refreshWorldList() {
            const list = document.getElementById('world-list');
            list.innerHTML = '';
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('MC_HTML_')) {
                    const name = key.replace('MC_HTML_', '');
                    const div = document.createElement('div');
                    div.className = 'world-item';
                    div.innerText = "🌍 " + name;
                    div.onclick = function() {
                        document.querySelectorAll('.world-item').forEach(el => el.classList.remove('selected'));
                        this.classList.add('selected');
                        selectedWorldName = name;
                    };
                    list.appendChild(div);
                }
            }
        }

        document.getElementById('btn-create-world').addEventListener('click', () => {
            const name = prompt("Nombre del nuevo mundo:");
            if(name) {
                localStorage.setItem('MC_HTML_' + name, JSON.stringify({player: {x:0, y:1, z:0}}));
                refreshWorldList();
            }
        });

        document.getElementById('btn-delete-world').addEventListener('click', () => {
            if(selectedWorldName) {
                if(confirm("¿Borrar " + selectedWorldName + "?")) {
                    localStorage.removeItem('MC_HTML_' + selectedWorldName);
                    selectedWorldName = null;
                    refreshWorldList();
                }
            }
        });

        document.getElementById('btn-play-selected').addEventListener('click', () => {
            if(!selectedWorldName) return alert("Selecciona un mundo primero");
            showScreen('none');
            document.getElementById('crosshair').style.display = 'block';
            if(window.startGame) window.startGame(selectedWorldName);
        });

        function resumeGame() {
            showScreen('none');
            if(window.setPause) window.setPause(false);
        }

        window.addEventListener('keydown', e => {
            if(e.key === "Escape") {
                showScreen('esc-menu');
                if(window.setPause) window.setPause(true);
            }
        });

        refreshWorldList();
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
