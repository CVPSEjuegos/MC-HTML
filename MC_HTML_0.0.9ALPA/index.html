<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Minecraft HTML5 - 0.0.9 ALPHA</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87ceeb; font-family: sans-serif; }
        #crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid white;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }
        #hotbar {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px;
            background: rgba(0,0,0,0.6); padding: 10px;
            border-radius: 5px; border: 2px solid #333;
        }
        .slot { width: 40px; height: 40px; border: 2px solid #555; }
        .selected { border-color: white !important; box-shadow: 0 0 10px white; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="hotbar">
        <div id="slot1" class="slot selected" style="background: #55aa55;"></div>
        <div id="slot2" class="slot" style="background: #808080;"></div>
        <div id="slot3" class="slot" style="background: #8b4513;"></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
