<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HTML-CRAFT ALPHA GOLD</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; }
        canvas { display: block; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 20; }
        .active { display: flex !important; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 350px; }
        .btn { padding: 12px; background: #444; color: white; border: 2px solid #000; cursor: pointer; font-weight: bold; font-size: 16px; text-transform: uppercase; }
        .btn:hover { background: #666; border-color: #fff; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; display: none; pointer-events: none; z-index: 5; }
        
        #ui-hearts { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-110%); 
            display: flex; 
            gap: 4px; 
            z-index: 100; 
            pointer-events: none;
        }
        .heart { width: 18px; height: 18px; background: #ff0000; border: 2px solid #000; }
        .heart.empty { background: #333 !important; opacity: 0.3; }

        .settings-panel { background: #222; padding: 20px; border: 2px solid #555; width: 350px; margin-top: 10px; }
        .setting-item { display: flex; flex-direction: column; margin-bottom: 15px; }
        .setting-item label { font-size: 12px; margin-bottom: 5px; color: #aaa; }
        input[type=range] { cursor: pointer; accent-color: #448032; }
        
        #loading-screen { background: #000; z-index: 100; }
        .loader-bar { width: 300px; height: 10px; background: #222; border: 1px solid #fff; margin-top: 10px; }
        #progress { width: 0%; height: 100%; background: #448032; }
    </style>
</head>
<body>

    <div id="crosshair">+</div>
    <div id="ui-hearts"></div>

    <div id="death-screen" class="screen">
        <h1 style="color: #ff0000; font-size: 48px; letter-spacing: 10px;">HAS MUERTO</h1>
        <div class="btn-group">
            <button class="btn" onclick="location.reload()">Reaparecer</button>
            <button class="btn" onclick="showScreen('main-menu')">Menú Principal</button>
        </div>
    </div>

    <div id="loading-screen" class="screen">
        <h2 id="load-text">CARGANDO MUNDO...</h2>
        <div class="loader-bar"><div id="progress"></div></div>
    </div>

    <div id="main-menu" class="screen active">
        <h1 style="letter-spacing: 5px; color: #448032;">HTML-CRAFT</h1>
        <div class="btn-group">
            <button class="btn" onclick="showScreen('singleplayer')">Un Jugador</button>
            <button class="btn">Multijugador</button>
        </div>
    </div>

    <div id="singleplayer" class="screen">
        <h2>MUNDOS LOCALES</h2>
        <div class="btn-group">
            <button class="btn" id="btn-play-alpha">Cargar Mundo Alpha</button>
            <button class="btn" onclick="showScreen('main-menu')">Volver</button>
        </div>
    </div>

    <div id="esc-menu" class="screen">
        <h2>PAUSA</h2>
        <div class="settings-panel">
            <div class="setting-item">
                <label>FOV: <span id="val-fov">60</span></label>
                <input type="range" id="slider-fov" min="60" max="120" value="60">
            </div>
            <div class="setting-item">
                <label>FPS MAX: <span id="val-fps">120</span></label>
                <input type="range" id="slider-fps" min="30" max="300" value="120">
            </div>
            <div class="setting-item">
                <label>NIEBLA: <span id="val-fog">10</span></label>
                <input type="range" id="slider-fog" min="1" max="50" value="10">
            </div>
        </div>
        <div class="btn-group" style="margin-top: 20px;">
            <button class="btn" id="btn-resume">Reanudar</button>
            <button class="btn" onclick="location.reload()">Salir al Menú</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script>
        window.showScreen = function(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            const target = document.getElementById(id);
            if (target) target.style.display = 'flex';
        };
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
