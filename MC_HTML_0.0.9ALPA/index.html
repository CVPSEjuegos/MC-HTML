<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML-CRAFT ALPHA</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif;color:white}

.screen{
position:absolute;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
background:rgba(0,0,0,0.85);
}

.active{display:flex}

.btn{
padding:10px;
margin:5px;
background:#444;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
font-size:20px;
}

</style>
</head>

<body>

<div id="crosshair">+</div>

<!-- MENU PRINCIPAL -->
<div id="main-menu" class="screen active">

<h1>HTML-CRAFT</h1>
<h3>Version 0.0.9</h3>

<button class="btn" id="btn-play-alpha">
Cargar Mundo Alpha
</button>

</div>

<!-- LOADING -->
<div id="loading-screen" class="screen">

<h2>Cargando Mundo...</h2>

</div>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>

<script type="module">

import { init } from "./Game.js"

document.getElementById("btn-play-alpha").onclick = ()=>{

document.getElementById("main-menu").classList.remove("active")
document.getElementById("loading-screen").classList.add("active")

setTimeout(()=>{
init()
},500)

}

</script>

</body>
</html>
