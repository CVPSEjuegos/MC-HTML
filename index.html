<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MC_HTML Launcher</title>
    <style>
        /* Estilos estilo Minecraft Launcher */
        body { margin: 0; background: #1e1e1e; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 200px; background: #252526; border-right: 2px solid #333; display: flex; flex-direction: column; }
        .side-btn { padding: 15px; cursor: pointer; border-bottom: 1px solid #333; text-align: center; }
        .side-btn:hover { background: #333; }
        #main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        .play-section { background: #3c3c3c; width: 100%; padding: 20px; position: absolute; bottom: 0; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .play-btn { background: #448032; color: white; border: none; padding: 15px 60px; font-size: 20px; cursor: pointer; font-weight: bold; }
        .play-btn:hover { background: #529b3d; }
        select { padding: 10px; background: #252526; color: white; border: 1px solid #555; }
        iframe { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 100; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="side-btn">JUGAR</div>
        <div class="side-btn">INSTALACIONES</div>
        <div class="side-btn">SKINS</div>
    </div>

    <div id="main">
        <h1>MC_HTML <span style="color: #ff0000;">ALPHA</span></h1>
        <p>Selecciona una versión disponible en el repositorio:</p>

        <div class="play-section">
            <select id="version-select">
                <option value="MC_HTML_0.0.1ALPHA">MC_HTML_0.0.1ALPHA</option>
            </select>
            <button class="play-btn" onclick="iniciarJuego()">¡JUGAR!</button>
        </div>
    </div>

    <iframe id="game-frame"></iframe>

    <script>
        function iniciarJuego() {
            const carpeta = document.getElementById('version-select').value;
            const frame = document.getElementById('game-frame');
            
            // IMPORTANTE: GitHub Pages necesita la ruta relativa correcta
            // Buscamos el index.html dentro de la carpeta seleccionada
            frame.src = `./${carpeta}/index.html`;
            frame.style.display = 'block';

            // Pantalla completa automática
            if (frame.requestFullscreen) frame.requestFullscreen();
        }

        // Para cerrar el juego con ESC y volver al Launcher
        window.addEventListener('message', (e) => {
            if(e.data === 'close') {
                document.getElementById('game-frame').style.display = 'none';
                document.getElementById('game-frame').src = '';
            }
        });
    </script>
</body>
</html>
