<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MC-HTML Alpha 0.0.1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 20; color: white; }
        .active { display: flex !important; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; display: none; pointer-events: none; z-index: 5; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 300px; }
        .btn { padding: 12px; background: #444; color: white; border: 2px solid #000; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #666; }
    </style>
</head>
<body>

    <div id="crosshair">+</div>

    <div id="main-menu" class="screen active">
        <h1>HTML-CRAFT ALPHA</h1>
        <div class="btn-group">
            <button class="btn" onclick="showScreen('singleplayer')">Un Jugador</button>
            <button class="btn" onclick="showScreen('multiplayer')">Multijugador</button>
        </div>
    </div>

    <div id="singleplayer" class="screen">
        <h2>Mundos</h2>
        <div class="btn-group">
            <button class="btn" id="btn-play-alpha">Cargar Mundo Alpha</button>
            <button class="btn" onclick="showScreen('main-menu')">Volver</button>
        </div>
    </div>

    <div id="esc-menu" class="screen">
        <h2>PAUSA</h2>
        <div class="btn-group">
            <button class="btn" id="btn-resume">Reanudar</button>
            <button class="btn" onclick="location.reload()">Salir</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script>
        // Función global para cambiar pantallas
        window.showScreen = function(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
