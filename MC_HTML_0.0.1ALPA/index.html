<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HTML-Craft Pro 0.0.1</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 20; }
        .active { display: flex; }
        h1 { color: #fff; text-shadow: 3px 3px #000; font-size: 3rem; margin-bottom: 40px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 300px; }
        .btn { padding: 15px; background: #444; color: #fff; border: 2px solid #000; cursor: pointer; text-align: center; font-weight: bold; }
        .btn:hover { background: #5a5a5a; border-color: #fff; }
        .world-list, .server-list { width: 400px; height: 200px; background: #222; border: 2px solid #000; margin-bottom: 20px; overflow-y: auto; padding: 10px; }
        .list-item { padding: 8px; background: #333; margin-bottom: 5px; border: 1px solid #444; cursor: pointer; }
        .list-item:hover { background: #444; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; display: none; pointer-events: none; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen active">
        <h1>HTML-CRAFT PRO</h1>
        <div class="btn-group">
            <button class="btn" onclick="showScreen('singleplayer-menu')">Un jugador</button>
            <button class="btn" onclick="showScreen('multiplayer-menu')">Multijugador</button>
            <button class="btn" onclick="window.parent.postMessage('close', '*')">Salir</button>
        </div>
    </div>

    <div id="singleplayer-menu" class="screen">
        <h2>Mundos Guardados</h2>
        <div class="world-list" id="world-list">
            </div>
        <div class="btn-group" style="flex-direction: row; width: 500px;">
            <button class="btn" style="flex:1" id="btn-play-world">Jugar Mundo</button>
            <button class="btn" style="flex:1" id="btn-create-world">Crear Nuevo</button>
            <button class="btn" style="flex:1">Eliminar</button>
            <button class="btn" style="flex:1" onclick="showScreen('main-menu')">Cancelar</button>
        </div>
    </div>

    <div id="multiplayer-menu" class="screen">
        <h2>Servidores</h2>
        <div class="server-list" id="server-list">
            <div class="list-item">Servidor de Prueba (Offline)</div>
        </div>
        <div class="btn-group" style="flex-direction: row; width: 600px;">
            <button class="btn" style="flex:1" onclick="showScreen('main-menu')">Volver</button>
            <button class="btn" style="flex:1">Abrir Servidor</button>
            <button class="btn" style="flex:1">Conectar</button>
            <button class="btn" style="flex:1">Actualizar</button>
        </div>
    </div>

    <div id="crosshair">+</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
    <script type="module" src="./game.js"></script>
</body>
</html>
